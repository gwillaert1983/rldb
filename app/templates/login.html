<!DOCTYPE html>
<html lang="nl" class="bg-gray-950 text-gray-100 h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RLDB</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-white tracking-tight">RLDB</h1>
      <p class="text-gray-500 text-sm mt-1">Profiel database</p>
    </div>

    {% if error %}
    <div class="mb-4 px-4 py-3 rounded-lg bg-red-900/40 border border-red-800 text-red-300 text-sm">
      Ongeldige gebruikersnaam of wachtwoord.
    </div>
    {% endif %}

    <form method="post" action="/login" class="bg-gray-900 border border-gray-800 rounded-xl p-6 space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1" for="username">Gebruikersnaam</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        >
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1" for="password">Wachtwoord</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        >
      </div>
      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded-lg text-sm transition"
      >
        Inloggen
      </button>
    </form>
  </div>

</body>
</html>
