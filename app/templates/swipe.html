{% extends "base.html" %}
{% block title %}Swipe — RLDB{% endblock %}
{% block content %}

<style>
/* Swipe-pagina vult de beschikbare hoogte */
#swipe-root { height: calc(100vh - 44px - 2.5rem); display: flex; flex-direction: column; margin: -1.25rem; }
#swipe-card { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; scroll-behavior: smooth; }
#swipe-card.swiping { overflow-y: hidden; }
#swipe-photo-area { position: relative; flex-shrink: 0; height: 65vh; min-height: 320px; }
#swipe-photo-area img { width: 100%; height: 100%; object-fit: cover; display: block; }
.swipe-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
#overlay-left  { background: rgba(251,146,60,0.55); }
#overlay-right { background: rgba(250,204,21,0.55); }
#swipe-card { will-change: transform; }
</style>

<div id="swipe-root">

  <!-- Topbar -->
  <div class="flex items-center justify-between px-4 py-2.5 shrink-0 border-b border-gray-800 bg-gray-950">
    <a href="/" class="text-gray-500 hover:text-gray-300 text-sm transition">← Terug</a>
    <span id="swipe-counter" class="text-xs text-gray-500 font-mono"></span>
    <div class="flex gap-2">
      <button onclick="doAction('archive')"
              class="w-8 h-8 rounded-full border border-orange-700 text-orange-400 hover:bg-orange-700/20 flex items-center justify-center text-base transition"
              title="Archiveren">✕</button>
      <button onclick="doAction('favourite')"
              class="w-8 h-8 rounded-full border border-yellow-600 text-yellow-400 hover:bg-yellow-600/20 flex items-center justify-center text-base transition"
              title="Favoriet">★</button>
    </div>
  </div>

  <!-- Scrollbare kaart -->
  <div id="swipe-card">

    <!-- Hoofdfoto met swipe-detectie -->
    <div id="swipe-photo-area">
      <img id="swipe-photo" src="" alt="">
      <div id="swipe-nophoto" class="hidden absolute inset-0 bg-gray-900 flex items-center justify-center">
        <span class="text-gray-700 text-5xl">—</span>
      </div>
      <div id="overlay-left"  class="swipe-overlay"><span class="text-white text-7xl font-bold drop-shadow-lg">✕</span></div>
      <div id="overlay-right" class="swipe-overlay"><span class="text-white text-7xl font-bold drop-shadow-lg">★</span></div>
      <!-- Naam overlay -->
      <div class="absolute bottom-0 left-0 right-0 px-4 pb-4 pt-12"
           style="background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 100%)">
        <a id="swipe-link" href="#" onclick="return false">
          <div id="swipe-name" class="text-white font-bold text-xl leading-tight"></div>
          <div id="swipe-sub"  class="text-gray-300 text-sm mt-0.5"></div>
        </a>
      </div>
    </div>

    <!-- Extra foto's -->
    <div id="swipe-thumbs" class="hidden flex gap-2 p-3 overflow-x-auto bg-gray-900 border-b border-gray-800 shrink-0"></div>

    <!-- Profieldetails -->
    <div id="swipe-details" class="p-4 space-y-4 bg-gray-950 pb-6"></div>

  </div>

  <!-- Actieknoppen onderaan -->
  <div class="flex items-center justify-center gap-6 py-3 shrink-0 border-t border-gray-800 bg-gray-950">
    <button onclick="doAction('archive')"
            class="flex items-center gap-2 px-5 py-2.5 rounded-full border-2 border-orange-600 text-orange-400 hover:bg-orange-600/20 text-sm font-medium transition">
      ✕ Archiveren
    </button>
    <button onclick="doAction('skip')"
            class="w-10 h-10 rounded-full border border-gray-700 text-gray-500 hover:bg-gray-800 flex items-center justify-center text-lg transition"
            title="Overslaan">→</button>
    <button onclick="doAction('favourite')"
            class="flex items-center gap-2 px-5 py-2.5 rounded-full border-2 border-yellow-500 text-yellow-400 hover:bg-yellow-600/20 text-sm font-medium transition">
      ★ Favoriet
    </button>
  </div>

  <!-- Klaar -->
  <div id="swipe-done" class="hidden flex-1 flex flex-col items-center justify-center gap-3 py-16">
    <p class="text-gray-400 text-xl">Geen profielen meer</p>
    <a href="/" class="text-blue-400 hover:text-blue-300 text-sm transition">← Terug naar overzicht</a>
  </div>

</div>

<script>
const _profiles = {{ profile_data_json | safe }};
let _idx = 0;

function showCard(idx) {
  if (idx >= _profiles.length) {
    document.getElementById('swipe-card').classList.add('hidden');
    document.querySelectorAll('#swipe-root > div:not(#swipe-done):not(:first-child)').forEach(el => el.classList.add('hidden'));
    document.getElementById('swipe-done').classList.remove('hidden');
    return;
  }
  const p = _profiles[idx];
  const card = document.getElementById('swipe-card');
  card.scrollTo(0, 0);
  card.style.transform = '';
  card.style.opacity   = '1';
  card.classList.remove('hidden', 'swiping');

  // Foto
  const photo    = document.getElementById('swipe-photo');
  const nophoto  = document.getElementById('swipe-nophoto');
  if (p.photos && p.photos.length > 0) {
    photo.src = p.photos[0].url;
    photo.classList.remove('hidden');
    nophoto.classList.add('hidden');
  } else {
    photo.classList.add('hidden');
    nophoto.classList.remove('hidden');
  }

  // Naam + sub
  document.getElementById('swipe-name').textContent = p.name;
  const sub = [p.age, p.nationality, p.location].filter(Boolean).join(' · ');
  document.getElementById('swipe-sub').textContent = sub;
  document.getElementById('swipe-link').href = '/profile/' + p.id;
  document.getElementById('swipe-counter').textContent = `${idx + 1} / ${_profiles.length}`;

  // Extra foto's
  const thumbs = document.getElementById('swipe-thumbs');
  if (p.photos && p.photos.length > 1) {
    thumbs.classList.remove('hidden');
    thumbs.classList.add('flex');
    thumbs.innerHTML = p.photos.map((ph, pi) =>
      `<button onclick="setSwipePhoto('${ph.url}')" class="shrink-0 w-16 h-20 overflow-hidden rounded-lg border-2 ${pi===0?'border-blue-500':'border-transparent hover:border-gray-500'}">
        <img src="${ph.thumb}" class="w-full h-full object-cover">
      </button>`
    ).join('');
  } else {
    thumbs.classList.add('hidden');
    thumbs.classList.remove('flex');
  }

  // Details
  const details = document.getElementById('swipe-details');
  let html = '';

  // Stat grid: leeftijd / lengte / gewicht / nationaliteit
  const stats = [
    p.age         && {lbl:'Leeftijd',  val: p.age},
    p.height      && {lbl:'Lengte',    val: p.height},
    p.weight      && {lbl:'Gewicht',   val: p.weight},
    p.nationality && {lbl:'Herkomst',  val: p.nationality},
    p.ethnicity   && {lbl:'Etniciteit',val: p.ethnicity},
    p.hair        && {lbl:'Haar',      val: p.hair},
    p.eyes        && {lbl:'Ogen',      val: p.eyes},
    p.gender      && {lbl:'Geslacht',  val: p.gender},
  ].filter(Boolean);
  if (stats.length) {
    html += `<div class="grid grid-cols-2 gap-2">` +
      stats.map(s => `<div class="bg-gray-900 rounded-lg px-3 py-2">
        <div class="text-xs text-gray-500 mb-0.5">${s.lbl}</div>
        <div class="text-sm text-white font-medium">${s.val}</div>
      </div>`).join('') + `</div>`;
  }

  // Talen
  if (p.languages) {
    html += `<div class="flex gap-2 text-sm items-start">
      <span class="text-gray-500 shrink-0 w-20">Talen</span>
      <span class="text-gray-200">${p.languages}</span>
    </div>`;
  }

  // Telefoon
  if (p.phone) {
    html += `<div class="flex gap-2 text-sm items-center">
      <span class="text-gray-500 shrink-0 w-20">Telefoon</span>
      <a href="tel:${p.phone}" class="text-blue-400 hover:text-blue-300 font-mono" onclick="event.stopPropagation()">${p.phone}</a>
    </div>`;
  }

  // Prijs
  const prijzen = [
    p.price_incall  && `Incall: ${p.price_incall}`,
    p.price_outcall && `Outcall: ${p.price_outcall}`,
    (!p.price_incall && !p.price_outcall && p.price) && p.price,
  ].filter(Boolean);
  if (prijzen.length) {
    html += `<div class="bg-gray-900 border border-gray-800 rounded-lg px-4 py-3">
      <div class="text-xs text-gray-500 mb-1.5">Tarieven</div>
      <div class="flex flex-wrap gap-3">` +
        prijzen.map(pr => `<span class="text-sm text-green-400 font-medium">${pr}</span>`).join('') +
      `</div>
    </div>`;
  }

  // Mogelijkheden per categorie
  if (p.services_by_cat && Object.keys(p.services_by_cat).length) {
    html += `<div>
      <div class="text-xs text-gray-500 mb-2">Mogelijkheden</div>
      <div class="space-y-2">`;
    for (const [cat, items] of Object.entries(p.services_by_cat)) {
      html += `<div>
        <div class="text-xs text-gray-600 mb-1">${cat}</div>
        <div class="flex flex-wrap gap-1">${items.map(s =>
          `<span class="bg-gray-800 text-gray-300 text-xs px-2 py-0.5 rounded-full border border-gray-700">${s}</span>`
        ).join('')}</div>
      </div>`;
    }
    html += `</div></div>`;
  } else if (p.services && p.services.length) {
    html += `<div>
      <div class="text-xs text-gray-500 mb-2">Mogelijkheden</div>
      <div class="flex flex-wrap gap-1">${p.services.map(s =>
        `<span class="bg-gray-800 text-gray-300 text-xs px-2 py-0.5 rounded-full border border-gray-700">${s}</span>`
      ).join('')}</div>
    </div>`;
  }

  // Bio
  if (p.bio) {
    html += `<div class="border-t border-gray-800 pt-4 text-sm text-gray-400 leading-relaxed">${p.bio}</div>`;
  }

  // Link naar volledig profiel
  html += `<div class="border-t border-gray-800 pt-3">
    <a href="/profile/${p.id}" class="text-xs text-blue-500 hover:text-blue-400 transition" onclick="event.stopPropagation()">
      Volledig profiel bekijken →
    </a>
  </div>`;

  details.innerHTML = html || '<p class="text-xs text-gray-600 py-2">Geen extra details beschikbaar.</p>';

  resetOverlays();
}

window.setSwipePhoto = function(url) {
  document.getElementById('swipe-photo').src = url;
};

function resetOverlays() {
  document.getElementById('overlay-left').style.opacity  = '0';
  document.getElementById('overlay-right').style.opacity = '0';
}

async function doAction(type) {
  if (_idx >= _profiles.length) return;
  const p = _profiles[_idx];
  const card = document.getElementById('swipe-card');
  if (type === 'favourite') {
    card.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
    card.style.transform  = 'translateX(120%) rotate(12deg)';
    card.style.opacity    = '0';
    await fetch('/profile/' + p.id + '/favourite', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ set: true }),
    });
    setTimeout(() => { _idx++; showCard(_idx); }, 340);
  } else if (type === 'archive') {
    card.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
    card.style.transform  = 'translateX(-120%) rotate(-12deg)';
    card.style.opacity    = '0';
    await fetch('/profile/' + p.id + '/archive', { method: 'POST' });
    setTimeout(() => { _idx++; showCard(_idx); }, 340);
  } else {
    _idx++; showCard(_idx);
  }
}

// Swipe detectie op de foto
(function() {
  const area = document.getElementById('swipe-photo-area');
  const card = document.getElementById('swipe-card');
  const THRESHOLD = 80;
  let sx = 0, sy = 0, dx = 0, active = false;

  area.addEventListener('touchstart', e => {
    sx = e.changedTouches[0].clientX;
    sy = e.changedTouches[0].clientY;
    dx = 0; active = false;
    card.style.transition = 'none';
  }, { passive: true });

  area.addEventListener('touchmove', e => {
    dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (!active && Math.abs(dy) > Math.abs(dx)) return;
    active = true;
    card.classList.add('swiping');
    const rot = dx * 0.04;
    card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
    const pct = Math.min(Math.abs(dx) / THRESHOLD, 1);
    document.getElementById(dx > 0 ? 'overlay-right' : 'overlay-left').style.opacity = pct;
    document.getElementById(dx > 0 ? 'overlay-left' : 'overlay-right').style.opacity = 0;
  }, { passive: true });

  area.addEventListener('touchend', () => {
    if (!active) return;
    active = false;
    card.classList.remove('swiping');
    if (Math.abs(dx) >= THRESHOLD) {
      doAction(dx > 0 ? 'favourite' : 'archive');
    } else {
      card.style.transition = 'transform 0.2s ease';
      card.style.transform  = '';
      resetOverlays();
    }
  }, { passive: true });

  // Muisdrag (desktop)
  let dragging = false, msx = 0;
  area.addEventListener('mousedown', e => {
    dragging = true; msx = e.clientX; dx = 0;
    card.style.transition = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    dx = e.clientX - msx;
    card.style.transform = `translateX(${dx}px) rotate(${dx*0.04}deg)`;
    const pct = Math.min(Math.abs(dx) / THRESHOLD, 1);
    document.getElementById(dx > 0 ? 'overlay-right' : 'overlay-left').style.opacity = pct;
    document.getElementById(dx > 0 ? 'overlay-left' : 'overlay-right').style.opacity = 0;
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    if (Math.abs(dx) >= THRESHOLD) doAction(dx > 0 ? 'favourite' : 'archive');
    else { card.style.transition = 'transform 0.2s ease'; card.style.transform = ''; resetOverlays(); }
  });
})();

showCard(0);
</script>
{% endblock %}
